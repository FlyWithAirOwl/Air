<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyFlow – Moderne Flugsuche</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Farbanpassung: Blau -> Gelb, Weiß -> Schwarz */
      --primary: #FFD700; /* Gold-Gelb */
      --primary-hover: #EAB308;
      --accent: #10B981; 
      --bg: #000000;      /* Hintergrund Schwarz */
      --card-bg: #111827; /* Dunkles Anthrazit für Karten */
      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(255, 255, 255, 0.05);
    }

    body { 
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
      margin: 0; 
      background: var(--bg); 
      color: var(--text-main);
      line-height: 1.5;
    }

    header { 
      background: #000000; 
      padding: 3rem 1rem; 
      text-align: center; 
      border-bottom: 1px solid #334155;
    }

    header h1 { margin: 0; font-size: 2.5rem; letter-spacing: -0.025em; color: var(--primary); }
    header p { color: var(--text-muted); margin-top: 0.5rem; }

    main { max-width: 1000px; margin: -2rem auto 3rem; padding: 0 1rem; }

    section { 
      background: var(--card-bg); 
      border-radius: var(--radius); 
      padding: 1.5rem; 
      margin-bottom: 1.5rem; 
      box-shadow: var(--shadow);
      border: 1px solid #1F2937;
    }

    .search-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; }

    input, select {
      background: #1F2937;
      color: white;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus, select:focus { border-color: var(--primary); }

    button { 
      background: var(--primary); 
      color: #000000; /* Text auf Gelb schwarz für bessere Lesbarkeit */
      border: none; 
      border-radius: 8px; 
      padding: 0.75rem 1.5rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover { background: var(--primary-hover); transform: translateY(-1px); }

    .btn-coupon { background: #334155; color: white; border: 1px solid #475569; }
    .btn-coupon:hover { background: #475569; }

    .map { 
      height: 200px; 
      background: #111827 url('https://www.transparenttextures.com/patterns/cubes.png');
      display: flex; align-items: center; justify-content: center; 
      color: var(--text-muted); font-weight: 500;
    }

    /* Result Cards */
    .flight-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem;
      border-radius: var(--radius);
      background: var(--card-bg);
      margin-bottom: 1rem;
      border: 1px solid #1F2937;
      transition: all 0.3s ease;
    }

    .flight-card:hover { border-color: var(--primary); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }

    .flight-info h3 { margin: 0; font-size: 1.25rem; color: var(--primary); }
    .flight-info p { margin: 0.25rem 0; color: var(--text-muted); font-size: 0.9rem; }

    .price-tag { text-align: right; }
    .price-tag .amount { font-size: 1.5rem; font-weight: 700; color: #ffffff; }
    .price-tag .link { color: var(--primary); text-decoration: none; font-weight: 600; font-size: 0.9rem; display: block; margin-top: 0.5rem; }

    @media (max-width: 600px) {
      .flight-card { flex-direction: column; text-align: center; gap: 1rem; }
      .price-tag { text-align: center; }
    }
  </style>
</head>
<body>

<header>
  <h1>SkyFlow</h1>
  <p>Entdecke dein nächstes Abenteuer</p>
</header>

<main>
  <section>
    <div class="search-bar">
      <input id="from" placeholder="Von: Berlin" />
      <input id="to" placeholder="Wohin? (z.B. Rom)" />
      <input type="date" id="date" />
      <button onclick="search()">Flüge finden</button>
      <button class="btn-coupon" onclick="findCoupons()">Gutscheine</button>
    </div>
  </section>

  <section class="search-bar" style="background: #111827; border: 1px solid #334155;">
    <select id="baggage">
      <option value="any">Alle Gepäckarten</option>
      <option value="hand">Nur Handgepäck</option>
      <option value="checked">Aufgabegepäck</option>
    </select>
    <select id="continent">
      <option value="any">Alle Kontinente</option>
      <option value="Europa">Europa</option>
      <option value="Asien">Asien</option>
      <option value="Amerika">Amerika</option>
    </select>
    <select id="temperature">
      <option value="any">Temperatur egal</option>
      <option value="20">> 20 °C</option>
      <option value="30">> 30 °C</option>
    </select>
  </section>

  <div id="results"></div>
</main>

<script>
// (Der JavaScript-Teil bleibt funktional identisch, nur die Anzeige nutzt nun die neuen CSS-Klassen)
const flights = [
  { airline:'Lufthansa', from:'Berlin', to:'Lissabon', continent:'Europa', temp:25, stops:0, baggage:'checked', price:189, season:'Mai – September' },
  { airline:'Ryanair', from:'Berlin', to:'Rom', continent:'Europa', temp:28, stops:0, baggage:'hand', price:79, season:'April – Oktober' },
  { airline:'Emirates', from:'Berlin', to:'Dubai', continent:'Asien', temp:35, stops:1, baggage:'checked', price:420, season:'November – März' },
  { airline:'LATAM', from:'Berlin', to:'São Paulo', continent:'Amerika', temp:26, stops:1, baggage:'checked', price:690, season:'Mai – September' }
];

function search() {
  const container = document.getElementById('results');
  container.innerHTML = '<p style="text-align:center; color: #FFD700;">Suche wird geladen...</p>';

  setTimeout(() => {
    const to = document.getElementById('to').value.toLowerCase();
    const baggage = document.getElementById('baggage').value;
    const continent = document.getElementById('continent').value;
    const temperature = document.getElementById('temperature').value;

    let results = flights.filter(f =>
      (to === '' || to === 'egal' || f.to.toLowerCase().includes(to)) &&
      (baggage === 'any' || f.baggage === baggage) &&
      (continent === 'any' || f.continent === continent) &&
      (temperature === 'any' || f.temp >= temperature)
    );

    render(results);
  }, 400);
}

function findCoupons() {
  alert("🎟️ Suche nach Codes...\nAktuell sind alle Gutscheine vergriffen.");
}

function render(list) {
  const container = document.getElementById('results');
  container.innerHTML = '';

  if (list.length === 0) {
    container.innerHTML = '<section style="text-align:center;"><h3>Keine Ergebnisse</h3><p>Versuch es mit anderen Filtern.</p></section>';
    return;
  }

  list.forEach(f => {
    const div = document.createElement('div');
    div.className = 'flight-card';
    div.innerHTML = `
      <div class="flight-info">
        <h3>${f.airline}</h3>
        <p><strong>${f.from}</strong> nach <strong>${f.to}</strong></p>
        <p>☀️ Beste Reisezeit: ${f.season} (${f.temp}°C)</p>
      </div>
      <div class="price-tag">
        <div class="amount">${f.price} €</div>
        <a class="link" href="#">Ansehen →</a>
      </div>
    `;
    container.appendChild(div);
  });
}

search();
</script>
</body>
</html>
